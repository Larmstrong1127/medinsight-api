name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Mypy type check
        run: mypy app/

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-placeholder-for-ci' }}
      ANTHROPIC_API_KEY: sk-ant-placeholder-for-ci
      API_KEYS: test-key
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /tmp/medinsight-test
      ENCRYPTION_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --cov=app --cov-report=xml --cov-fail-under=70

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target production -t medinsight-api:ci .

      - name: Smoke test container
        run: |
          docker run -d --name smoke \
            -e API_KEYS=test-key \
            -e STORAGE_BACKEND=local \
            -p 8000:8000 \
            medinsight-api:ci
          sleep 5
          curl --fail http://localhost:8000/health
          docker stop smoke
